name: Daily Government Capital Flows Dashboard

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install axios cheerio

      - name: Generate dashboard
        run: node generate-dashboard.js

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit and push changes
        run: |
          git add index.html
          git commit -m "Daily update: %^(date '+%Y-%m-%d %H:%M:%S'^) government capital flows" || echo "No changes to commit"
          git push

      - name: Verify deployment
        run: echo "Dashboard updated successfully"
