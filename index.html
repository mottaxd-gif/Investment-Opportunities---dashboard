<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Government Capital Flows Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; padding: 30px 0; border-bottom: 2px solid #334155; }
        .header h1 { font-size: 2.4em; margin-bottom: 10px; background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .header .subtitle { color: #94a3b8; font-size: 1em; margin-bottom: 6px; }
        .timestamp { color: #64748b; font-size: 0.85em; }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 18px; margin-bottom: 36px; }
        .summary-card { background: #1e293b; border-left: 4px solid #3b82f6; padding: 18px; border-radius: 8px; text-align: center; }
        .summary-card.critical { border-left-color: #ef4444; }
        .summary-card.major { border-left-color: #f97316; }
        .summary-card.sectors { border-left-color: #8b5cf6; }
        .summary-card h3 { color: #94a3b8; font-size: 0.76em; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
        .summary-card .number { font-size: 2.2em; font-weight: bold; color: #60a5fa; }
        .summary-card.critical .number { color: #ef4444; }
        .summary-card.major .number { color: #f97316; }
        .summary-card.sectors .number { color: #a78bfa; }
        .summary-card .label { font-size: 0.76em; color: #64748b; margin-top: 4px; }
        .section-title { font-size: 0.88em; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid #334155; }
        .filter-bar { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 20px; }
        .fbtn { padding: 5px 13px; border-radius: 16px; border: 1px solid #334155; background: #1e293b; color: #94a3b8; cursor: pointer; font-size: 0.78em; transition: all 0.2s; }
        .fbtn:hover, .fbtn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
        .findings { display: grid; gap: 12px; margin-bottom: 36px; }
        .finding-card { background: #1e293b; border-radius: 8px; overflow: hidden; border: 1px solid #334155; cursor: pointer; transition: all 0.25s ease; }
        .finding-card:hover { border-color: #60a5fa; box-shadow: 0 4px 18px rgba(96,165,250,0.1); }
        .finding-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 18px; background: #0f172a; }
        .finding-card.expanded .finding-header { background: #1e3a5f; }
        .finding-title { display: flex; align-items: flex-start; gap: 13px; flex: 1; }
        .finding-rank { width: 30px; height: 30px; background: #3b82f6; color: white; border-radius: 50%; text-align: center; line-height: 30px; font-weight: bold; font-size: 0.85em; flex-shrink: 0; }
        .r1 { background: #ef4444 !important; }
        .r2 { background: #f97316 !important; }
        .r3 { background: #eab308 !important; color: #1e293b !important; }
        .finding-text { flex: 1; }
        .finding-text h3 { color: #e2e8f0; font-size: 0.94em; margin-bottom: 6px; line-height: 1.4; }
        .badges { display: flex; flex-wrap: wrap; gap: 5px; }
        .badge { padding: 2px 8px; border-radius: 10px; font-size: 0.71em; font-weight: 600; }
        .b-sector { background: #1e3a5f; color: #93c5fd; border: 1px solid #3b82f6; }
        .b-agency { background: #1a2e1a; color: #86efac; border: 1px solid #22c55e; }
        .b-early { background: #1c1a2e; color: #c4b5fd; border: 1px solid #8b5cf6; }
        .b-confirm { background: #1a2e2e; color: #67e8f9; border: 1px solid #06b6d4; }
        .b-late { background: #2e1a1a; color: #fca5a5; border: 1px solid #ef4444; }
        .b-extreme { background: #7f1d1d; color: #fca5a5; }
        .b-high { background: #7c2d12; color: #fdba74; }
        .b-medium { background: #713f12; color: #fcd34d; }
        .b-low { background: #1e3a1e; color: #86efac; }
        .toggle-icon { font-size: 1em; color: #64748b; transition: transform 0.3s ease; margin-left: 10px; flex-shrink: 0; }
        .finding-card.expanded .toggle-icon { transform: rotate(180deg); }
        .finding-body { padding: 18px; display: none; border-top: 1px solid #334155; }
        .finding-card.expanded .finding-body { display: block; }
        .fs { margin-bottom: 13px; }
        .fs h4 { color: #60a5fa; font-size: 0.74em; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
        .fs p { color: #cbd5e1; line-height: 1.65; font-size: 0.9em; }
        .companies-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; }
        .ctag { background: #334155; padding: 3px 9px; border-radius: 4px; font-size: 0.78em; color: #cbd5e1; border: 1px solid #475569; }
        .meta-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #334155; align-items: center; }
        .atag { background: #0f2942; color: #60a5fa; border: 1px solid #1e4a7a; padding: 3px 9px; border-radius: 4px; font-size: 0.78em; font-weight: 600; }
        .src { color: #60a5fa; text-decoration: none; font-size: 0.82em; }
        .src:hover { text-decoration: underline; }
        .top-signal { background: linear-gradient(135deg, #1a0a2e 0%, #0f172a 100%); border: 2px solid #8b5cf6; border-radius: 10px; padding: 24px; margin-bottom: 36px; }
        .top-signal h2 { color: #c4b5fd; margin-bottom: 12px; font-size: 1.1em; }
        .top-signal p { color: #ddd6fe; line-height: 1.8; font-size: 0.91em; }
        .footer { text-align: center; margin-top: 24px; padding-top: 18px; border-top: 1px solid #334155; color: #475569; font-size: 0.78em; }
    </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>&#x1F4B0; Government Capital Flows</h1>

  <div class="summary-grid" id="sg"></div>
  <div class="section-title">Filter by Sector</div>

  <div class="section-title">Today&#x2019;s Findings &mdash; May 27, 2026</div>
  <div class="findings" id="fc"></div>
  <div class="top-signal">
    <h2>&#x1F3AF; Highest-Priority Signal Today</h2>
    <p id="tsc"></p>
  </div>
  <div class="footer">
    <p>Auto-generated: <span id="ft"></span> &nbsp;|&nbsp; Next update: Tomorrow 9:00 AM &nbsp;|&nbsp;
    <a href="https://mottaxd-gif.github.io/Investment-Opportunities---dashboard/" style="color:#60a5fa;">Live Dashboard</a></p>
  </div>
</div>

    what: "World Wide Technology secured a $40M Air Force contract for AI-enabled cybersecurity operations. The Air Force Research Laboratory awarded six companies positions on a $200M IDIQ for advanced aerospace vehicle R&D. FY2026 NDAA authorized $900.6B in defense spending with AI and cybersecurity as explicit statutory priorities.",

const stageClass = { EARLY:"b-early", CONFIRMATION:"b-confirm", LATE:"b-late" };
const impactClass = { EXTREME:"b-extreme", HIGH:"b-high", MEDIUM:"b-medium", LOW:"b-low" };
let activeFilter = "All";

function getSectors() {
  return ["All", ...Array.from(new Set(findingsData.map(f => f.sector)))];
}

function renderSummary() {
  const d = findingsData;
  const extreme = d.filter(f => f.market_impact === "EXTREME").length;
  const highPlus = d.filter(f => ["EXTREME","HIGH"].includes(f.market_impact)).length;
  const sectors = new Set(d.map(f => f.sector)).size;
  document.getElementById('sg').innerHTML = [
    ['summary-card','Total Findings', d.length, 'Active signals today'],
    ['summary-card critical','Extreme Impact', extreme, 'Highest priority'],
    ['summary-card major','High+ Impact', highPlus, 'Significant signals'],
    ['summary-card sectors','Sectors Active', sectors, 'Priority areas covered'],
    ['summary-card','Capital Identified', '$28.5B+', 'Across all findings']
  ].map(([cls,lbl,num,sub]) =>
    `<div class="${cls}"><h3>${lbl}</h3><div class="number">${num}</div><div class="label">${sub}</div></div>`
  ).join('');
}

function renderFilters() {
  document.getElementById('fb').innerHTML = getSectors().map(s =>
    `<button class="fbtn ${s===activeFilter?'active':''}" onclick="setFilter('${s}')">${s}</button>`
  ).join('');
}

function setFilter(s) { activeFilter = s; renderFilters(); renderFindings(); }

function renderFindings() {
  const data = activeFilter === "All" ? findingsData : findingsData.filter(f => f.sector === activeFilter);
  document.getElementById('fc').innerHTML = data.map(f => {
    const r = findingsData.indexOf(f) + 1;
    const rc = r<=3 ? `r${r}` : '';
    return `
      <div class="finding-card" onclick="this.classList.toggle('expanded')">
        <div class="finding-header">
          <div class="finding-title">
            <div class="finding-rank ${rc}">#${r}</div>
            <div class="finding-text">
              <h3>${f.title}</h3>
              <div class="badges">
                <span class="badge b-sector">${f.sector}</span>
                <span class="badge b-agency">${f.agency}</span>
                <span class="badge ${stageClass[f.signal_stage]}">${f.signal_stage}</span>
                <span class="badge ${impactClass[f.market_impact]}">${f.market_impact} IMPACT</span>
              </div>
            </div>
          </div>
          <div class="toggle-icon">&#9660;</div>
        </div>
        <div class="finding-body">
          <div class="fs"><h4>What Happened</h4><p>${f.what}</p></div>
          <div class="fs"><h4>Why It Matters</h4><p>${f.why}</p></div>
          <div class="fs"><h4>Companies Involved</h4><div class="companies-list">${f.companies.map(c=>`<span class="ctag">${c}</span>`).join('')}</div></div>
          <div class="fs"><h4>Timeline</h4><p>${f.timeline}</p></div>
          <div class="meta-row">
            <span class="atag">&#x1F4B0; ${f.amount}</span>
            <span class="badge b-sector">${f.support_type.toUpperCase()}</span>
            <a href="${f.source}" target="_blank" class="src">&#x1F4F0; View Source &#x2192;</a>
          </div>
        </div>
      </div>`;
  }).join('');
}

function renderTopSignal() {
  const t = findingsData[0];
  document.getElementById('tsc').innerHTML =
    `<strong style="color:#e9d5ff;">#1 Signal &mdash; ${t.sector}: ${t.title}</strong><br><br>` +
    `${t.why}<br><br>` +
    `<strong style="color:#c4b5fd;">Amount:</strong> ${t.amount} &nbsp;|&nbsp; ` +
    `<strong style="color:#c4b5fd;">Stage:</strong> ${t.signal_stage} &nbsp;|&nbsp; ` +
    `<strong style="color:#c4b5fd;">Market Impact:</strong> ${t.market_impact}`;
}

(function init() {
  const now = new Date();
  document.getElementById('ts').textContent = 'Updated: ' + now.toLocaleString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
  document.getElementById('ft').textContent = now.toLocaleString();
  renderSummary(); renderFilters(); renderFindings(); renderTopSignal();
})();
</script>
</body>
</html>
